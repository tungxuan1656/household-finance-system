name: Harness Size Check

on:
  push:
    branches: [ main, ci/** ]
    paths:
      - 'harness/**'
      - 'scripts/check_harness_size.sh'
  pull_request:
    branches: [ main ]
    paths:
      - 'harness/**'
      - 'scripts/check_harness_size.sh'

jobs:
  harness-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run harness size check
        run: bash scripts/check_harness_size.sh
