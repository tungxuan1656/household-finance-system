name: Verify code (lint, test, typecheck)

on:
  pull_request:
    branches: [ main ]

jobs:
  prepare:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      worker: ${{ steps.filter.outputs.worker }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
            worker:
              - 'apps/worker/**'
            shared:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/verify-code.yml'

  verify-web:
    name: Verify Web (lint, typecheck, test:web)
    needs: prepare
    if: needs.prepare.outputs.web == 'true' || needs.prepare.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter ./apps/web...

      - name: Lint
        run: pnpm --filter ./apps/web lint

      - name: Typecheck
        run: pnpm --filter ./apps/web typecheck

      - name: Test Web
        run: pnpm --filter ./apps/web test

  verify-worker:
    name: Verify Worker (lint, typecheck, test:worker)
    needs: prepare
    if: needs.prepare.outputs.worker == 'true' || needs.prepare.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter ./apps/worker...

      - name: Lint
        run: pnpm --filter ./apps/worker lint

      - name: Typecheck
        run: pnpm --filter ./apps/worker typecheck

      - name: Test Worker
        run: pnpm --filter ./apps/worker test
