name: Verify code (lint, test, typecheck)

on:
  pull_request:
    branches: [ main ]

jobs:
  prepare:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      worker: ${{ steps.filter.outputs.worker }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
            worker:
              - 'apps/worker/**'
            shared:
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - '.github/workflows/verify-code.yml'

  verify:
    name: Verify Changed Apps
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: |
          set -euo pipefail

          install_args=(pnpm install --frozen-lockfile)

          if [ "${{ needs.prepare.outputs.shared }}" = "true" ]; then
            install_args+=(--filter ./apps/web... --filter ./apps/worker...)
          else
            if [ "${{ needs.prepare.outputs.web }}" = "true" ]; then
              install_args+=(--filter ./apps/web...)
            fi

            if [ "${{ needs.prepare.outputs.worker }}" = "true" ]; then
              install_args+=(--filter ./apps/worker...)
            fi
          fi

          "${install_args[@]}"

      - name: Lint
        if: needs.prepare.outputs.web == 'true' || needs.prepare.outputs.shared == 'true'
        run: pnpm --filter ./apps/web lint

      - name: Typecheck
        if: needs.prepare.outputs.web == 'true' || needs.prepare.outputs.shared == 'true'
        run: pnpm --filter ./apps/web typecheck

      - name: Test Web
        if: needs.prepare.outputs.web == 'true' || needs.prepare.outputs.shared == 'true'
        run: pnpm --filter ./apps/web test

      - name: Lint Worker
        if: needs.prepare.outputs.worker == 'true' || needs.prepare.outputs.shared == 'true'
        run: pnpm --filter ./apps/worker lint

      - name: Typecheck Worker
        if: needs.prepare.outputs.worker == 'true' || needs.prepare.outputs.shared == 'true'
        run: pnpm --filter ./apps/worker typecheck

      - name: Test Worker
        if: needs.prepare.outputs.worker == 'true' || needs.prepare.outputs.shared == 'true'
        run: pnpm --filter ./apps/worker test
