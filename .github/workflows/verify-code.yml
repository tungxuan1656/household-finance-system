name: Verify code (lint, test, typecheck)

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'apps/web/**'
      - 'apps/worker/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/verify-code.yml'
      - 'scripts/detect_ci_scope.sh'

jobs:
  prepare:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.scope.outputs.web }}
      worker: ${{ steps.scope.outputs.worker }}
      shared: ${{ steps.scope.outputs.shared }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect scope
        id: scope
        run: bash scripts/detect_ci_scope.sh "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"

  verify:
    name: Verify Changed Apps
    needs: prepare
    if: needs.prepare.outputs.web == 'true' || needs.prepare.outputs.worker == 'true' || needs.prepare.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: needs.prepare.outputs.web == 'true' || needs.prepare.outputs.shared == 'true'
        run: pnpm run lint:web

      - name: Typecheck
        if: needs.prepare.outputs.web == 'true' || needs.prepare.outputs.shared == 'true'
        run: pnpm run typecheck:web

      - name: Test Web
        if: needs.prepare.outputs.web == 'true' || needs.prepare.outputs.shared == 'true'
        run: pnpm run test:web

      - name: Lint Worker
        if: needs.prepare.outputs.worker == 'true' || needs.prepare.outputs.shared == 'true'
        run: pnpm run lint:worker

      - name: Typecheck Worker
        if: needs.prepare.outputs.worker == 'true' || needs.prepare.outputs.shared == 'true'
        run: pnpm run typecheck:worker

      - name: Test Worker
        if: needs.prepare.outputs.worker == 'true' || needs.prepare.outputs.shared == 'true'
        run: pnpm run test:worker
